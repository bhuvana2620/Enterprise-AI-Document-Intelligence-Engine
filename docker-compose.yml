services:
  # --- FastAPI Backend Service ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: document-intelligence-core:latest
    container_name: doc-intel-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - PYTHONPATH=/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  # --- Streamlit Frontend UI Service ---
  frontend:
    image: document-intelligence-core:latest
    container_name: doc-intel-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000
      - PYTHONPATH=/app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - backend
    volumes:
      - ./app.py:/app/app.py
      - ./src:/app/src
      - ./data:/app/data